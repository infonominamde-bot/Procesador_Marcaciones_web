<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Procesador de Marcaciones v2.0</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<link rel="stylesheet" href="./Styles.css"/>
</head>
<body class="page-procesador">

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Procesando datos, por favor espere...</div>
</div>

<div class="header">Procesador De Marcaciones</div>
<div class="container">
    <div class="workspace">
        <div class="sidebar">
            <div class="card">
                <h3>Seleccionar Rango de Revisión</h3>
                <div class="date-grid">
                    <div>
                        <label class="field-label" for="dateStart">Fecha de Inicio de Revisión</label>
                        <input id="dateStart" type="date">
                    </div>
                    <div>
                        <label class="field-label" for="dateEnd">Fecha de Fin de Revisión</label>
                        <input id="dateEnd" type="date">
                    </div>
                </div>
            </div>
    
            <div class="card">
                <div class="card-title-row">
                    <h3>Cargar Archivos de Origen</h3>
                    <div class="card-title-actions">
                        <label class="checkbox-inline compact" for="includeAllContracts">
                            <input id="includeAllContracts" type="checkbox" checked>
                            <span>Incluir todos los contratos</span>
                        </label>
                        <label class="checkbox-inline compact" for="chkOnlyReviewMain">
                            <input id="chkOnlyReviewMain" type="checkbox">
                            <span>Solo novedades</span>
                        </label>
                    </div>
                </div>
                <div class="control-group">
                    <div class="files-grid">
                        <div class="file-option">
                            <div class="file-row">
                                <div class="file-row-main">
                                    <label class="field-label" for="fileAct">1. Activos (xlsx)</label>
                                    <input id="fileAct" type="file" accept=".xlsx,.xls">
                                </div>
                                <label class="file-check" for="chkAct">
                                    <input id="chkAct" type="checkbox" checked>
                                </label>
                            </div>
                        </div>
                        <div class="file-option">
                            <div class="file-row">
                                <div class="file-row-main">
                                    <label class="field-label" for="fileRev">2. Informe de Seguimiento (xlsx)</label>
                                    <input id="fileRev" type="file" accept=".xlsx,.xls">
                                </div>
                                <label class="file-check" for="chkRev">
                                    <input id="chkRev" type="checkbox" checked>
                                </label>
                            </div>
                        </div>
                        <div class="file-option">
                            <div class="file-row">
                                <div class="file-row-main">
                                    <label class="field-label" for="fileMarc">3. Marcaciones (csv)</label>
                                    <input id="fileMarc" type="file" accept=".csv,.xlsx,.xls">
                                </div>
                                <label class="file-check" for="chkMarc">
                                    <input id="chkMarc" type="checkbox" checked>
                                </label>
                            </div>
                        </div>
                        <div class="file-option">
                            <div class="file-row">
                                <div class="file-row-main">
                                    <label class="field-label" for="fileAus">4. Ausentismos (csv)</label>
                                    <input id="fileAus" type="file" accept=".xlsx,.xls,.csv">
                                </div>
                                <label class="file-check" for="chkAus">
                                    <input id="chkAus" type="checkbox" checked>
                                </label>
                            </div>
                        </div>
                        <div class="file-option">
                            <div class="file-row">
                                <div class="file-row-main">
                                    <label class="field-label" for="fileProg">5. Programación (csv)</label>
                                    <input id="fileProg" type="file" accept=".csv,.xlsx,.xls">
                                </div>
                                <label class="file-check" for="chkProg">
                                    <input id="chkProg" type="checkbox" checked>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn" id="btnRun">Procesar y Descargar Revisión</button>
                        <button class="btn" id="btnSummary" type="button">Dashboard</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer">
    Desarrollado por <b>Luis Felipe García Calle</b> &copy; 2025
</div>
    
</div>
<script src="./Scripts.js"></script>
</body>
</html>
