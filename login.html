<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Login</title>
<link rel="stylesheet" href="./Styles.css"/>
</head>
<body class="page-login">
    <main class="login-wrap">
        <section class="login-card">
            <h1>Procesador de Marcaciones</h1>
            <p>Inicia sesión para continuar</p>
            <form id="loginForm" class="login-form">
                <label for="loginEmail">Correo corporativo</label>
                <input id="loginEmail" type="email" required autocomplete="username" />
                <label for="loginPassword">Contraseña</label>
                <input id="loginPassword" type="password" required autocomplete="current-password" />
                <button id="btnLogin" type="submit">Ingresar</button>
            </form>
            <div id="loginMsg" class="login-msg"></div>
        </section>
    </main>
<script src="./Scripts.js"></script>
</body>
</html>
